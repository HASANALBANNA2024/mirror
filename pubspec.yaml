name: mirror
description: "A premium Flutter mirror application."

# এটি ব্যবহার করলে ভুল করে পাবলিকে আপলোড হবে না
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ক্যামেরার মেইন প্যাকেজ
  camera: ^0.11.0+2
  gal: ^2.3.2
  path_provider: ^2.1.2

  # স্ক্রিন ব্রাইটনেস কন্ট্রোল
  screen_brightness: ^2.1.7

  # আইকন এবং শেয়ারিং
  cupertino_icons: ^1.0.8
  share_plus: ^13.0.0
  shared_preferences: ^2.5.5

  # নেটিভ স্প্ল্যাশ স্ক্রিন প্যাকেজ (dependencies এ থাকা ভালো)
  flutter_native_splash: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# নেটিভ স্প্ল্যাশ কনফিগারেশন (এটি আলাদা ব্লকে থাকবে)
flutter_native_splash:
  color: "#121212"
  android_12:
    color: "#121212"
    # লোগো থাকলে এখানে পাথ দিতে পারেন
    # image: assets/splash_icon.png

flutter:
  # মেটেরিয়াল ডিজাইন আইকন এবং উইজেট ব্যবহারের জন্য
  uses-material-design: true

  # যদি ভবিষ্যতে লোগো বা ইমেজ ব্যবহার করেন তবে এখানে ফোল্ডারটি অ্যাড করবেন
  # assets:
  #   - assets/